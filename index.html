<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinguaSwap – Translation App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Theme Toggle ─────────────────────────── -->
  <div class="top-bar">
    <button class="dark-toggle" id="themeToggle">🌙 Dark</button>
  </div>

  <!-- ── Header ───────────────────────────────── -->
  <header>
    <h1>ZedSwap</h1>
    <p>Instant multilingual translation · Powered by MyMemory API</p>
  </header>

  <!-- ── Main Card ────────────────────────────── -->
  <div class="card">

    <!-- Language Selector Bar -->
    <div class="lang-bar">
      <div class="lang-select-wrap source-wrap">
        <select id="sourceLang">
          <option value="auto">Detect Language</option>
          <option value="en" selected>English</option>
          <option value="fr">French</option>
          <option value="es">Spanish</option>
          <option value="de">German</option>
          <option value="zh">Chinese</option>
          <option value="ar">Arabic</option>
          <option value="pt">Portuguese</option>
          <option value="ru">Russian</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="it">Italian</option>
          <option value="nl">Dutch</option>
          <option value="hi">Hindi</option>
        </select>
      </div>

      <button class="switch-btn" id="switchBtn" title="Switch languages">⇄</button>

      <div class="lang-select-wrap target-wrap">
        <select id="targetLang">
          <option value="en">English</option>
          <option value="fr" selected>French</option>
          <option value="es">Spanish</option>
          <option value="de">German</option>
          <option value="zh">Chinese</option>
          <option value="ar">Arabic</option>
          <option value="pt">Portuguese</option>
          <option value="ru">Russian</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="it">Italian</option>
          <option value="nl">Dutch</option>
          <option value="hi">Hindi</option>
        </select>
      </div>
    </div>

    <!-- Text Panels -->
    <div class="panels">

      <!-- Input Panel -->
      <div class="panel">
        <div class="panel-label">Input</div>
        <textarea
          id="inputText"
          placeholder="Type something to translate…"
          maxlength="500"
        >Hello, how are you</textarea>
        <div class="panel-footer">
          <button class="icon-btn" id="listenInput" title="Listen">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            </svg>
            Listen
          </button>
          <button class="icon-btn" id="copyInput" title="Copy">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            Copy
          </button>
          <span class="char-count" id="charCount">18/500</span>
        </div>
      </div>

      <!-- Output Panel -->
      <div class="panel">
        <div class="panel-label">Output</div>
        <div class="output-text placeholder-text" id="outputText">
          Bonjour, comment allez-vous
        </div>
        <div class="panel-footer">
          <button class="icon-btn" id="listenOutput" title="Listen">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            </svg>
            Listen
          </button>
          <button class="icon-btn" id="copyOutput" title="Copy">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            Copy
          </button>
        </div>
      </div>

    </div><!-- /.panels -->

    <!-- Translate Button -->
    <div class="translate-wrap">
      <button class="translate-btn" id="translateBtn">
        <span class="loader"></span>
        Translate
      </button>
    </div>

  </div><!-- /.card -->

  <!-- Toast Notification -->
  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
